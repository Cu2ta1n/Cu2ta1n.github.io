<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kyle Zhu的论文阅读</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #fefdf8;
            color: #2d3748;
            min-height: 100vh;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        
        /* Header */
        .header {
            text-align: center;
            padding: 40px 20px 30px;
            background: linear-gradient(135deg, #e8f4f8 0%, #fef9e7 50%, #fce7f3 100%);
            border-bottom: 2px solid #e2e8f0;
            margin-bottom: 30px;
        }
        .header h1 {
            font-size: 2.2em;
            color: #4a90a4;
            margin-bottom: 8px;
        }
        .header .subtitle { 
            color: #7c9eb2; 
            font-size: 1.1em; 
            opacity: 0.9;
            letter-spacing: 2px;
        }
        .header .update-time { color: #a0aec0; font-size: 0.8em; margin-top: 10px; }
        
        /* Stats row */
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
            margin-bottom: 25px;
        }
        .stat-card {
            background: linear-gradient(135deg, #ffffff, #f7fafc);
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            padding: 18px 14px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        .stat-card .number {
            font-size: 1.8em;
            font-weight: bold;
            color: #4a90a4;
        }
        .stat-card .label { color: #718096; font-size: 0.85em; margin-top: 4px; }
        
        /* Progress */
        .progress-section {
            background: linear-gradient(135deg, #ffffff, #f7fafc);
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            padding: 18px 20px;
            margin-bottom: 25px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        .progress-header { display: flex; justify-content: space-between; margin-bottom: 10px; }
        .progress-header span { color: #718096; font-size: 0.9em; }
        .progress-header .pct { color: #4a90a4; font-weight: bold; }
        .progress-bar { width: 100%; height: 10px; background: #e2e8f0; border-radius: 5px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #4a90a4, #7cc6d9); border-radius: 5px; transition: width 0.4s; }
        
        /* Daily reading input */
        .daily-reading-section {
            background: linear-gradient(135deg, #ffffff, #f7fafc);
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 25px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        .daily-reading-section h3 {
            color: #4a90a4;
            font-size: 1.1em;
            margin-bottom: 15px;
        }
        .daily-input-row {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }
        .daily-input-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .daily-input-group label {
            color: #718096;
            font-size: 0.9em;
        }
        .daily-input-group input {
            padding: 8px 12px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 0.9em;
            width: 120px;
        }
        .btn-save-daily {
            padding: 8px 20px;
            background: #4a90a4;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9em;
        }
        .btn-save-daily:hover {
            background: #3a7a8a;
        }
        
        /* GitHub contribution graph */
        .contribution-section {
            background: linear-gradient(135deg, #ffffff, #f7fafc);
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 25px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        .contribution-section h3 {
            color: #4a90a4;
            font-size: 1.1em;
            margin-bottom: 15px;
        }
        .contribution-graph {
            display: flex;
            gap: 3px;
            overflow-x: auto;
            padding: 10px 0;
        }
        .contribution-week {
            display: flex;
            flex-direction: column;
            gap: 3px;
        }
        .contribution-day {
            width: 14px;
            height: 14px;
            border-radius: 2px;
            background: #ebedf0;
            position: relative;
            cursor: pointer;
        }
        .contribution-day.level-1 { background: #c6e48b; }
        .contribution-day.level-2 { background: #7bc96f; }
        .contribution-day.level-3 { background: #239a3b; }
        .contribution-day.level-4 { background: #196127; }
        .contribution-day:hover::after {
            content: attr(data-tooltip);
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            background: #2d3748;
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            white-space: nowrap;
            z-index: 10;
        }
        .contribution-legend {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 10px;
            font-size: 0.85em;
            color: #718096;
        }
        .legend-box {
            width: 14px;
            height: 14px;
            border-radius: 2px;
        }
        
        /* Charts section */
        .charts-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 25px;
        }
        .chart-card {
            background: linear-gradient(135deg, #ffffff, #f7fafc);
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        .chart-card h3 { color: #4a90a4; font-size: 1em; margin-bottom: 15px; }
        .chart-container { position: relative; max-height: 280px; }
        
        /* Filters */
        .filters {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 20px;
            align-items: center;
        }
        .filter-group { display: flex; gap: 6px; flex-wrap: wrap; }
        .filter-btn {
            padding: 6px 14px;
            border: 2px solid #e2e8f0;
            background: white;
            color: #718096;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85em;
            transition: all 0.2s;
        }
        .filter-btn:hover { border-color: #4a90a4; color: #4a90a4; }
        .filter-btn.active { background: #4a90a4; border-color: #4a90a4; color: white; }
        .filter-label { color: #a0aec0; font-size: 0.8em; align-self: center; }
        
        /* Week tabs */
        .week-tabs {
            display: flex;
            gap: 6px;
            margin-bottom: 20px;
            overflow-x: auto;
            padding-bottom: 5px;
        }
        .week-tab {
            padding: 7px 14px;
            background: white;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            cursor: pointer;
            white-space: nowrap;
            font-size: 0.85em;
            color: #718096;
            transition: all 0.2s;
        }
        .week-tab:hover { border-color: #4a90a4; color: #4a90a4; }
        .week-tab.active { background: #4a90a4; border-color: #4a90a4; color: white; }
        
        /* Paper cards */
        .papers-grid { display: grid; gap: 14px; }
        .paper-card {
            background: linear-gradient(135deg, #ffffff, #f7fafc);
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            padding: 18px 20px;
            transition: all 0.2s;
            position: relative;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        .paper-card:hover { border-color: #4a90a4; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(74,144,164,0.15); }
        .paper-card.read { opacity: 0.6; border-color: #a8d8a8; }
        .paper-card.read .paper-title { text-decoration: line-through; color: #a0aec0; }
        .paper-card .read-badge {
            display: none;
            position: absolute;
            top: 14px;
            right: 16px;
            background: #a8d8a8;
            color: #2d5a2d;
            padding: 3px 10px;
            border-radius: 6px;
            font-size: 0.75em;
            font-weight: 600;
        }
        .paper-card.read .read-badge { display: block; }
        
        .paper-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; margin-bottom: 12px; }
        .paper-title { font-size: 1.05em; font-weight: 600; color: #2d3748; flex: 1; line-height: 1.4; }
        .paper-badges { display: flex; gap: 6px; flex-wrap: wrap; flex-shrink: 0; }
        .badge { padding: 3px 9px; border-radius: 6px; font-size: 0.72em; font-weight: 500; white-space: nowrap; }
        .badge-p1 { background: #fed7d7; color: #c53030; }
        .badge-p2 { background: #fef3c7; color: #b7791f; }
        .badge-p3 { background: #e9d8fd; color: #6b46c1; }
        .badge-method { background: #bee3f8; color: #2b6cb0; }
        .badge-cat { background: #c6f6d5; color: #276749; }
        .badge-hours { background: #fed7e2; color: #b83280; }
        
        .paper-meta { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
        .meta-item { background: #f7fafc; padding: 10px 12px; border-radius: 8px; border: 1px solid #e2e8f0; }
        .meta-label { font-size: 0.72em; color: #a0aec0; margin-bottom: 3px; }
        .meta-value { font-size: 0.85em; color: #4a5568; line-height: 1.4; }
        
        .paper-actions { display: flex; gap: 8px; align-items: center; margin-bottom: 10px; }
        .btn {
            padding: 7px 14px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 0.82em;
            font-weight: 500;
            transition: all 0.2s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        .btn-arxiv { background: #e53e3e; color: white; }
        .btn-arxiv:hover { background: #c53030; }
        .btn-read { background: #bee3f8; color: #2b6cb0; border: 2px solid #90cdf4; }
        .btn-read:hover { background: #90cdf4; }
        .btn-read.is-read { background: #a8d8a8; color: #2d5a2d; border-color: #7bc96f; }
        .btn-notes { background: #fef3c7; color: #b7791f; border: 2px solid #fbd38d; }
        .btn-notes:hover { background: #fbd38d; }
        
        /* Notes section */
        .notes-section {
            margin-top: 12px;
            padding: 12px;
            background: #fffef5;
            border: 1px solid #fbd38d;
            border-radius: 8px;
            display: none;
        }
        .notes-section.show { display: block; }
        .notes-section textarea {
            width: 100%;
            min-height: 100px;
            padding: 10px;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            font-family: inherit;
            font-size: 0.9em;
            resize: vertical;
        }
        .notes-section .notes-actions {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }
        .btn-save-notes {
            padding: 6px 14px;
            background: #4a90a4;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85em;
        }
        .btn-save-notes:hover { background: #3a7a8a; }
        
        /* Sync buttons */
        .sync-bar {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-bottom: 20px;
        }
        .btn-sync {
            padding: 7px 14px;
            background: white;
            color: #4a90a4;
            border: 2px solid #4a90a4;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.82em;
        }
        .btn-sync:hover { background: #4a90a4; color: white; }
        
        /* Empty */
        .empty-state { text-align: center; padding: 50px; color: #a0aec0; }
        
        /* Responsive */
        @media (max-width: 768px) {
            .charts-row { grid-template-columns: 1fr; }
            .paper-meta { grid-template-columns: 1fr; }
            .paper-top { flex-direction: column; }
            .stats { grid-template-columns: repeat(2, 1fr); }
        }
        
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #f7fafc; }
        ::-webkit-scrollbar-thumb { background: #cbd5e0; border-radius: 3px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Kyle Zhu的论文阅读</h1>
        <p class="subtitle">具身智能，灵巧手</p>
        <p class="update-time" id="updateTime"></p>
    </div>
    
    <div class="container">
        <div class="stats">
            <div class="stat-card"><div class="number" id="totalPapers">-</div><div class="label">论文总数</div></div>
            <div class="stat-card"><div class="number" id="readCount">0</div><div class="label">已读</div></div>
            <div class="stat-card"><div class="number" id="unreadCount">-</div><div class="label">待读</div></div>
            <div class="stat-card"><div class="number" id="totalHours">-</div><div class="label">预计总时长</div></div>
            <div class="stat-card"><div class="number" id="readHours">0h</div><div class="label">已读时长</div></div>
        </div>
        
        <div class="progress-section">
            <div class="progress-header">
                <span>阅读进度</span>
                <span class="pct" id="progressText">0%</span>
            </div>
            <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
        </div>
        
        <div class="daily-reading-section">
            <h3>📊 今日阅读记录</h3>
            <div class="daily-input-row">
                <div class="daily-input-group">
                    <label>日期：</label>
                    <input type="date" id="dailyDate">
                </div>
                <div class="daily-input-group">
                    <label>阅读论文数：</label>
                    <input type="number" id="dailyPapers" min="0" value="0">
                </div>
                <div class="daily-input-group">
                    <label>阅读时间(小时)：</label>
                    <input type="number" id="dailyHours" min="0" step="0.5" value="0">
                </div>
                <button class="btn-save-daily" onclick="saveDailyReading()">保存今日记录</button>
            </div>
        </div>
        
        <div class="contribution-section">
            <h3>📅 阅读贡献图（最近 90 天）</h3>
            <div class="contribution-graph" id="contributionGraph"></div>
            <div class="contribution-legend">
                <span>少</span>
                <div class="legend-box" style="background: #ebedf0;"></div>
                <div class="legend-box" style="background: #c6e48b;"></div>
                <div class="legend-box" style="background: #7bc96f;"></div>
                <div class="legend-box" style="background: #239a3b;"></div>
                <div class="legend-box" style="background: #196127;"></div>
                <span>多</span>
            </div>
        </div>
        
        <div class="charts-row">
            <div class="chart-card">
                <h3>论文分类分布</h3>
                <div class="chart-container"><canvas id="categoryPie"></canvas></div>
            </div>
            <div class="chart-card">
                <h3>最近 7 天阅读统计</h3>
                <div class="chart-container"><canvas id="weeklyBar"></canvas></div>
            </div>
        </div>
        
        <div class="sync-bar">
            <button class="btn-sync" onclick="exportStatus()">导出已读状态</button>
            <button class="btn-sync" onclick="document.getElementById('importFile').click()">导入已读状态</button>
            <input type="file" id="importFile" accept=".json" style="display:none" onchange="importStatus(event)">
        </div>
        
        <div class="filters">
            <span class="filter-label">状态</span>
            <div class="filter-group" id="statusFilter">
                <button class="filter-btn active" data-status="all">全部</button>
                <button class="filter-btn" data-status="unread">待读</button>
                <button class="filter-btn" data-status="read">已读</button>
            </div>
            <span class="filter-label">类别</span>
            <div class="filter-group" id="categoryFilter">
                <button class="filter-btn active" data-category="all">全部</button>
            </div>
            <span class="filter-label">优先级</span>
            <div class="filter-group" id="priorityFilter">
                <button class="filter-btn active" data-priority="all">全部</button>
                <button class="filter-btn" data-priority="1">P1 必读</button>
                <button class="filter-btn" data-priority="2">P2 重要</button>
                <button class="filter-btn" data-priority="3">P3 选读</button>
            </div>
        </div>
        
        <div class="week-tabs" id="weekTabs">
            <div class="week-tab active" data-week="all">全部</div>
            <div class="week-tab" data-week="第1周">第1周</div>
            <div class="week-tab" data-week="第2周">第2周</div>
            <div class="week-tab" data-week="第3周">第3周</div>
            <div class="week-tab" data-week="第4周">第4周</div>
            <div class="week-tab" data-week="第5周">第5周</div>
            <div class="week-tab" data-week="第6周">第6周</div>
            <div class="week-tab" data-week="第7周">第7周</div>
            <div class="week-tab" data-week="第8周">第8周</div>
        </div>
        
        <div class="papers-grid" id="papersGrid"></div>
    </div>

    <script>
    let papersData = [];
    let categoriesData = {};
    let readStatus = JSON.parse(localStorage.getItem('paperReadStatus') || '{}');
    let paperNotes = JSON.parse(localStorage.getItem('paperNotes') || '{}');
    let dailyReading = JSON.parse(localStorage.getItem('dailyReading') || '{}');
    let currentFilters = { status: 'all', category: 'all', priority: 'all', week: 'all' };
    let categoryChart = null;
    let weeklyChart = null;

    // Set today's date as default
    document.getElementById('dailyDate').valueAsDate = new Date();

    async function loadData() {
        const resp = await fetch('data.json?t=' + Date.now());
        const data = await resp.json();
        papersData = data.papers;
        categoriesData = data.categories;
        
        document.getElementById('updateTime').textContent = '最后更新: ' + data.lastUpdated;
        document.getElementById('totalPapers').textContent = data.overview.totalPapers;
        document.getElementById('totalHours').textContent = data.overview.totalHours + 'h';
        
        // Build category filter buttons
        const catFilter = document.getElementById('categoryFilter');
        Object.keys(categoriesData).forEach(cat => {
            const btn = document.createElement('button');
            btn.className = 'filter-btn';
            btn.dataset.category = cat;
            btn.textContent = cat;
            catFilter.appendChild(btn);
        });
        
        // Re-attach filter listeners
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                const group = this.parentElement;
                group.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                if (this.dataset.status !== undefined) currentFilters.status = this.dataset.status;
                if (this.dataset.category !== undefined) currentFilters.category = this.dataset.category;
                if (this.dataset.priority !== undefined) currentFilters.priority = this.dataset.priority;
                renderPapers();
            });
        });
        
        document.querySelectorAll('.week-tab').forEach(tab => {
            tab.addEventListener('click', function() {
                document.querySelectorAll('.week-tab').forEach(t => t.classList.remove('active'));
                this.classList.add('active');
                currentFilters.week = this.dataset.week;
                renderPapers();
            });
        });
        
        renderCharts();
        updateStats();
        renderPapers();
        renderContributionGraph();
    }

    function renderCharts() {
        // Pie chart - category distribution with percentages
        const catLabels = Object.keys(categoriesData);
        const catCounts = catLabels.map(c => categoriesData[c].count);
        const total = catCounts.reduce((a, b) => a + b, 0);
        const catColors = ['#7cc6d9', '#f9d56e', '#a8d8a8', '#f8b4b4', '#c3aed6', '#f6c299', '#95e1d3', '#f38ba8', '#b8e0d2'];
        
        if (categoryChart) categoryChart.destroy();
        categoryChart = new Chart(document.getElementById('categoryPie'), {
            type: 'doughnut',
            data: {
                labels: catLabels.map((label, i) => `${label} (${catCounts[i]}篇, ${Math.round(catCounts[i]/total*100)}%)`),
                datasets: [{ data: catCounts, backgroundColor: catColors, borderColor: '#ffffff', borderWidth: 3 }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { 
                        position: 'right', 
                        labels: { color: '#4a5568', font: { size: 11 }, padding: 10 } 
                    }
                }
            }
        });
        
        // Bar chart - last 7 days reading
        const today = new Date();
        const last7Days = [];
        const last7Papers = [];
        const last7Hours = [];
        
        for (let i = 6; i >= 0; i--) {
            const date = new Date(today);
            date.setDate(date.getDate() - i);
            const dateStr = date.toISOString().split('T')[0];
            last7Days.push(dateStr.slice(5)); // MM-DD
            last7Papers.push(dailyReading[dateStr]?.papers || 0);
            last7Hours.push(dailyReading[dateStr]?.hours || 0);
        }
        
        if (weeklyChart) weeklyChart.destroy();
        weeklyChart = new Chart(document.getElementById('weeklyBar'), {
            type: 'bar',
            data: {
                labels: last7Days,
                datasets: [
                    { label: '论文数', data: last7Papers, backgroundColor: '#7cc6d988', borderColor: '#4a90a4', borderWidth: 2, yAxisID: 'y' },
                    { label: '阅读时间(h)', data: last7Hours, backgroundColor: '#f9d56e88', borderColor: '#f6c299', borderWidth: 2, yAxisID: 'y1' }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { labels: { color: '#4a5568', font: { size: 11 } } } },
                scales: {
                    x: { ticks: { color: '#718096' }, grid: { color: '#e2e8f033' } },
                    y: { position: 'left', ticks: { color: '#4a90a4' }, grid: { color: '#e2e8f033' }, title: { display: true, text: '论文数', color: '#4a90a4' } },
                    y1: { position: 'right', ticks: { color: '#f6c299' }, grid: { display: false }, title: { display: true, text: '小时', color: '#f6c299' } }
                }
            }
        });
    }

    function renderContributionGraph() {
        const graph = document.getElementById('contributionGraph');
        graph.innerHTML = '';
        
        const today = new Date();
        const startDate = new Date(today);
        startDate.setDate(startDate.getDate() - 89); // 90 days
        
        // Group by weeks
        const weeks = [];
        let currentWeek = [];
        
        for (let i = 0; i < 90; i++) {
            const date = new Date(startDate);
            date.setDate(date.getDate() + i);
            const dateStr = date.toISOString().split('T')[0];
            const reading = dailyReading[dateStr];
            const hours = reading?.hours || 0;
            
            let level = 0;
            if (hours > 0) level = 1;
            if (hours >= 1) level = 2;
            if (hours >= 2) level = 3;
            if (hours >= 3) level = 4;
            
            currentWeek.push({ date: dateStr, hours, level, dayOfWeek: date.getDay() });
            
            if (date.getDay() === 0 || i === 89) { // End of week or last day
                weeks.push(currentWeek);
                currentWeek = [];
            }
        }
        
        weeks.forEach(week => {
            const weekDiv = document.createElement('div');
            weekDiv.className = 'contribution-week';
            
            // Pad to 7 days
            while (week.length < 7) {
                week.unshift({ date: '', hours: 0, level: 0, dayOfWeek: -1 });
            }
            
            week.forEach(day => {
                const dayDiv = document.createElement('div');
                dayDiv.className = 'contribution-day';
                if (day.level > 0) {
                    dayDiv.classList.add('level-' + day.level);
                }
                if (day.date) {
                    dayDiv.setAttribute('data-tooltip', `${day.date}: ${day.hours}小时`);
                }
                weekDiv.appendChild(dayDiv);
            });
            
            graph.appendChild(weekDiv);
        });
    }

    function saveDailyReading() {
        const date = document.getElementById('dailyDate').value;
        const papers = parseInt(document.getElementById('dailyPapers').value) || 0;
        const hours = parseFloat(document.getElementById('dailyHours').value) || 0;
        
        if (!date) {
            alert('请选择日期');
            return;
        }
        
        dailyReading[date] = { papers, hours };
        localStorage.setItem('dailyReading', JSON.stringify(dailyReading));
        
        alert('保存成功！');
        renderContributionGraph();
        renderCharts();
    }

    function toggleRead(id) {
        readStatus[id] = !readStatus[id];
        localStorage.setItem('paperReadStatus', JSON.stringify(readStatus));
        updateStats();
        renderPapers();
    }

    function toggleNotes(id) {
        const notesSection = document.getElementById('notes-' + id);
        notesSection.classList.toggle('show');
    }

    function saveNotes(id) {
        const textarea = document.getElementById('notes-textarea-' + id);
        paperNotes[id] = textarea.value;
        localStorage.setItem('paperNotes', JSON.stringify(paperNotes));
        alert('笔记已保存！');
    }

    function updateStats() {
        const readCount = papersData.filter(p => readStatus[p.id]).length;
        const unreadCount = papersData.length - readCount;
        const progress = papersData.length ? Math.round((readCount / papersData.length) * 100) : 0;
        const readHours = papersData.filter(p => readStatus[p.id]).reduce((s, p) => s + p.hours, 0);
        
        document.getElementById('readCount').textContent = readCount;
        document.getElementById('unreadCount').textContent = unreadCount;
        document.getElementById('readHours').textContent = readHours + 'h';
        document.getElementById('progressText').textContent = progress + '%';
        document.getElementById('progressFill').style.width = progress + '%';
    }

    function renderPapers() {
        const grid = document.getElementById('papersGrid');
        let filtered = papersData.filter(p => {
            if (currentFilters.status === 'read' && !readStatus[p.id]) return false;
            if (currentFilters.status === 'unread' && readStatus[p.id]) return false;
            if (currentFilters.category !== 'all' && p.category !== currentFilters.category) return false;
            if (currentFilters.priority !== 'all' && p.priority !== parseInt(currentFilters.priority)) return false;
            if (currentFilters.week !== 'all' && p.week !== currentFilters.week) return false;
            return true;
        });
        
        if (!filtered.length) {
            grid.innerHTML = '<div class="empty-state">没有匹配的论文</div>';
            return;
        }
        
        grid.innerHTML = filtered.map(p => {
            const isRead = readStatus[p.id];
            const pClass = p.priority === 1 ? 'badge-p1' : p.priority === 2 ? 'badge-p2' : 'badge-p3';
            const pText = p.priority === 1 ? 'P1 必读' : p.priority === 2 ? 'P2 重要' : 'P3 选读';
            const arxivBtn = p.arxivLink ? '<a href="' + p.arxivLink + '" target="_blank" class="btn btn-arxiv">arXiv</a>' : '';
            const notes = paperNotes[p.id] || '';
            
            return '<div class="paper-card ' + (isRead ? 'read' : '') + '">' +
                '<span class="read-badge">已读</span>' +
                '<div class="paper-top">' +
                    '<div class="paper-title">' + p.title + '</div>' +
                    '<div class="paper-badges">' +
                        '<span class="badge ' + pClass + '">' + pText + '</span>' +
                        '<span class="badge badge-method">' + p.readMethod + '</span>' +
                        '<span class="badge badge-cat">' + p.category + '</span>' +
                        '<span class="badge badge-hours">' + p.hours + 'h</span>' +
                    '</div>' +
                '</div>' +
                '<div class="paper-meta">' +
                    '<div class="meta-item"><div class="meta-label">本篇目标</div><div class="meta-value">' + p.goal + '</div></div>' +
                    '<div class="meta-item"><div class="meta-label">阅读产出</div><div class="meta-value">' + p.output + '</div></div>' +
                '</div>' +
                '<div class="paper-actions">' +
                    arxivBtn +
                    '<button class="btn btn-read ' + (isRead ? 'is-read' : '') + '" onclick="toggleRead(' + p.id + ')">' +
                        (isRead ? '✓ 已读' : '标记已读') +
                    '</button>' +
                    '<button class="btn btn-notes" onclick="toggleNotes(' + p.id + ')">📝 阅读笔记</button>' +
                '</div>' +
                '<div class="notes-section" id="notes-' + p.id + '">' +
                    '<textarea id="notes-textarea-' + p.id + '" placeholder="在此记录阅读笔记...">' + notes + '</textarea>' +
                    '<div class="notes-actions">' +
                        '<button class="btn-save-notes" onclick="saveNotes(' + p.id + ')">保存笔记</button>' +
                    '</div>' +
                '</div>' +
            '</div>';
        }).join('');
    }

    function exportStatus() {
        const exportData = {
            readStatus,
            paperNotes,
            dailyReading,
            exportDate: new Date().toISOString()
        };
        const blob = new Blob([JSON.stringify(exportData, null, 2)], { type: 'application/json' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'paper-reading-data.json';
        a.click();
    }

    function importStatus(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const imported = JSON.parse(e.target.result);
                if (imported.readStatus) readStatus = Object.assign(readStatus, imported.readStatus);
                if (imported.paperNotes) paperNotes = Object.assign(paperNotes, imported.paperNotes);
                if (imported.dailyReading) dailyReading = Object.assign(dailyReading, imported.dailyReading);
                localStorage.setItem('paperReadStatus', JSON.stringify(readStatus));
                localStorage.setItem('paperNotes', JSON.stringify(paperNotes));
                localStorage.setItem('dailyReading', JSON.stringify(dailyReading));
                updateStats();
                renderPapers();
                renderContributionGraph();
                renderCharts();
                alert('导入成功！');
            } catch(err) {
                alert('导入失败：文件格式错误');
            }
        };
        reader.readAsText(file);
    }

    loadData();
    </script>
</body>
</html>
