<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kyle Zhu的论文阅读</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #fef9f3 0%, #f0f9ff 100%);
            color: #1e293b;
            min-height: 100vh;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        
        .header {
            text-align: center;
            padding: 40px 20px 30px;
            background: linear-gradient(135deg, #fef3c7 0%, #dbeafe 50%, #fce7f3 100%);
            border-radius: 16px;
            margin-bottom: 30px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }
        .header h1 {
            font-size: 2.2em;
            background: linear-gradient(90deg, #3b82f6, #8b5cf6, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }
        .header .subtitle { color: #64748b; font-size: 1.05em; }
        .header .update-time { color: #94a3b8; font-size: 0.8em; margin-top: 10px; }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
            margin-bottom: 25px;
        }
        .stat-card {
            background: white;
            border-radius: 12px;
            padding: 18px 14px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            border: 1px solid #e2e8f0;
        }
        .stat-card .number { font-size: 1.8em; font-weight: bold; }
        .stat-card:nth-child(1) .number { color: #3b82f6; }
        .stat-card:nth-child(2) .number { color: #10b981; }
        .stat-card:nth-child(3) .number { color: #f59e0b; }
        .stat-card:nth-child(4) .number { color: #8b5cf6; }
        .stat-card:nth-child(5) .number { color: #ec4899; }
        .stat-card .label { color: #64748b; font-size: 0.85em; margin-top: 4px; }
        
        .progress-section {
            background: white;
            border-radius: 12px;
            padding: 18px 20px;
            margin-bottom: 25px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            border: 1px solid #e2e8f0;
        }
        .progress-header { display: flex; justify-content: space-between; margin-bottom: 10px; }
        .progress-header span { color: #64748b; font-size: 0.9em; }
        .progress-header .pct { color: #3b82f6; font-weight: bold; }
        .progress-bar { width: 100%; height: 10px; background: #f1f5f9; border-radius: 5px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #3b82f6, #8b5cf6, #ec4899); border-radius: 5px; transition: width 0.4s; }
        
        .charts-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 25px;
        }
        .chart-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            border: 1px solid #e2e8f0;
        }
        .chart-card h3 { color: #334155; font-size: 1em; margin-bottom: 15px; }
        .chart-container { position: relative; max-height: 250px; }
        
        .contribution-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 25px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            border: 1px solid #e2e8f0;
        }
        .contribution-card h3 { color: #334155; font-size: 1em; margin-bottom: 15px; }
        .contribution-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 3px;
            padding-bottom: 10px;
        }
        .contribution-day {
            width: 12px;
            height: 12px;
            border-radius: 2px;
            background: #f1f5f9;
            cursor: pointer;
            transition: all 0.2s;
        }
        .contribution-day:hover { transform: scale(1.3); }
        .contribution-day.level-1 { background: #bfdbfe; }
        .contribution-day.level-2 { background: #60a5fa; }
        .contribution-day.level-3 { background: #3b82f6; }
        .contribution-day.level-4 { background: #1d4ed8; }
        .contribution-legend {
            display: flex;
            align-items: center;
            gap: 5px;
            margin-top: 10px;
            font-size: 0.8em;
            color: #64748b;
        }
        .legend-box { width: 12px; height: 12px; border-radius: 2px; }
        
        .filters {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }
        .search-box {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            font-size: 0.9em;
            background: white;
            transition: all 0.2s;
        }
        .search-box:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59,130,246,0.1);
        }
        .search-box::placeholder {
            color: #94a3b8;
        }
        .filter-row {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .filter-group { display: flex; gap: 6px; flex-wrap: wrap; }
        .filter-btn {
            padding: 6px 14px;
            border: 1px solid #e2e8f0;
            background: white;
            color: #64748b;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85em;
            transition: all 0.2s;
        }
        .filter-btn:hover { border-color: #3b82f6; color: #3b82f6; }
        .filter-btn.active { background: #3b82f6; border-color: #3b82f6; color: white; }
        .filter-label { color: #94a3b8; font-size: 0.8em; align-self: center; }
        
        .papers-grid { display: grid; gap: 14px; }
        .paper-card {
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 18px 20px;
            transition: all 0.2s;
            position: relative;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .paper-card:hover { border-color: #3b82f6; transform: translateY(-1px); box-shadow: 0 4px 16px rgba(59,130,246,0.1); }
        .paper-card.read { opacity: 0.6; }
        .paper-card.read .paper-title { text-decoration: line-through; color: #94a3b8; }
        .paper-card .read-badge {
            display: none;
            position: absolute;
            top: 14px;
            right: 16px;
            background: #d1fae5;
            color: #059669;
            padding: 3px 10px;
            border-radius: 6px;
            font-size: 0.75em;
            font-weight: 600;
        }
        .paper-card.read .read-badge { display: block; }
        
        .paper-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; margin-bottom: 12px; }
        .paper-title { font-size: 1.05em; font-weight: 600; color: #1e293b; flex: 1; line-height: 1.4; }
        .paper-badges { display: flex; gap: 6px; flex-wrap: wrap; flex-shrink: 0; }
        .badge { padding: 3px 9px; border-radius: 6px; font-size: 0.72em; font-weight: 500; white-space: nowrap; }
        .badge-p1 { background: #fee2e2; color: #dc2626; }
        .badge-p2 { background: #fef3c7; color: #d97706; }
        .badge-p3 { background: #e0e7ff; color: #6366f1; }
        .badge-method { background: #dbeafe; color: #2563eb; }
        .badge-cat { background: #fce7f3; color: #db2777; }
        .badge-hours { background: #d1fae5; color: #059669; }
        
        .paper-meta { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
        .meta-item { background: #f8fafc; padding: 10px 12px; border-radius: 8px; border: 1px solid #e2e8f0; }
        .meta-label { font-size: 0.72em; color: #94a3b8; margin-bottom: 3px; }
        .meta-value { font-size: 0.85em; color: #475569; line-height: 1.4; }
        
        .paper-actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
        .btn {
            padding: 7px 14px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 0.82em;
            font-weight: 500;
            transition: all 0.2s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        .btn-arxiv { background: #dc2626; color: white; }
        .btn-arxiv:hover { background: #b91c1c; }
        .btn-read { background: #f1f5f9; color: #64748b; border: 1px solid #e2e8f0; }
        .btn-read:hover { border-color: #10b981; color: #10b981; }
        .btn-read.is-read { background: #d1fae5; color: #059669; border-color: #10b981; }
        .btn-favorite { background: #f1f5f9; color: #64748b; border: 1px solid #e2e8f0; }
        .btn-favorite:hover { border-color: #fbbf24; color: #fbbf24; }
        .btn-favorite.is-favorite { background: #fef3c7; color: #d97706; border-color: #fbbf24; }
        .btn-note { background: #fef3c7; color: #d97706; border: 1px solid #fde68a; }
        .btn-note:hover { background: #fde68a; }
        .btn-add-link { background: #e0e7ff; color: #6366f1; border: 1px solid #c7d2fe; }
        .btn-add-link:hover { background: #c7d2fe; }
        .btn-delete { background: #fee2e2; color: #dc2626; border: 1px solid #fecaca; }
        .btn-delete:hover { background: #fecaca; }
        
        /* 删除确认弹窗 */
        .confirm-modal .modal {
            max-width: 400px;
            text-align: center;
        }
        .confirm-modal .modal h2 { color: #dc2626; }
        .confirm-modal .paper-name { 
            color: #334155; 
            font-weight: 600; 
            margin: 10px 0 20px;
            word-break: break-word;
            line-height: 1.4;
        }
        .confirm-modal .btn-danger {
            padding: 8px 20px;
            background: #dc2626;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9em;
            font-weight: 500;
        }
        .confirm-modal .btn-danger:hover { background: #b91c1c; }
        
        .add-link-form {
            display: none;
            margin-top: 10px;
            padding: 10px;
            background: #f8fafc;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
        }
        .add-link-form.show { display: flex; gap: 8px; align-items: center; }
        .add-link-form input {
            flex: 1;
            padding: 6px 10px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 0.85em;
        }
        .add-link-form button {
            padding: 6px 12px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85em;
        }
        
        .notes-section {
            display: none;
            margin-top: 14px;
            padding: 14px;
            background: #fffbeb;
            border-radius: 8px;
            border: 1px solid #fde68a;
        }
        .notes-section.show { display: block; }
        .notes-section h4 { color: #d97706; font-size: 0.9em; margin-bottom: 10px; }
        .note-field { margin-bottom: 10px; }
        .note-field label { display: block; font-size: 0.75em; color: #92400e; margin-bottom: 4px; }
        .note-field textarea {
            width: 100%;
            padding: 8px;
            border: 1px solid #fde68a;
            border-radius: 6px;
            font-size: 0.85em;
            resize: vertical;
            min-height: 60px;
            font-family: inherit;
        }
        .note-field textarea:focus { outline: none; border-color: #f59e0b; }
        
        .sync-bar {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .btn-sync {
            padding: 7px 14px;
            background: white;
            color: #64748b;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.82em;
        }
        .btn-sync:hover { border-color: #3b82f6; color: #3b82f6; }
        .btn-add-paper {
            padding: 7px 14px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.82em;
            font-weight: 600;
        }
        .btn-add-paper:hover { opacity: 0.9; }
        
        .empty-state { text-align: center; padding: 50px; color: #94a3b8; }
        
        /* Token 登录弹窗 */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-overlay.show { display: flex; }
        .modal {
            background: white;
            border-radius: 16px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }
        .modal h2 { color: #1e293b; margin-bottom: 8px; font-size: 1.3em; }
        .modal p { color: #64748b; font-size: 0.9em; margin-bottom: 16px; line-height: 1.5; }
        .modal input {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 0.9em;
            margin-bottom: 12px;
        }
        .modal input:focus { outline: none; border-color: #3b82f6; }
        .modal .modal-btns { display: flex; gap: 10px; justify-content: flex-end; }
        .modal .btn-primary {
            padding: 8px 20px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9em;
        }
        .modal .btn-primary:hover { background: #2563eb; }
        .modal .btn-secondary {
            padding: 8px 20px;
            background: #f1f5f9;
            color: #64748b;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9em;
        }
        .modal .btn-secondary:hover { background: #e2e8f0; }
        .modal .sync-status {
            font-size: 0.8em;
            padding: 6px 10px;
            border-radius: 6px;
            margin-top: 8px;
        }
        .modal .sync-status.success { background: #d1fae5; color: #059669; }
        .modal .sync-status.error { background: #fee2e2; color: #dc2626; }
        .modal .sync-status.info { background: #dbeafe; color: #2563eb; }
        
        /* 添加论文弹窗 */
        .add-paper-modal .modal {
            max-width: 600px;
            max-height: 90vh;
            overflow-y: auto;
        }
        .form-group { margin-bottom: 14px; }
        .form-group label {
            display: block;
            font-size: 0.85em;
            color: #334155;
            font-weight: 500;
            margin-bottom: 4px;
        }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 0.9em;
            font-family: inherit;
        }
        .form-group textarea { min-height: 60px; resize: vertical; }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            outline: none;
            border-color: #3b82f6;
        }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        
        .sync-indicator {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-size: 0.75em;
            color: #94a3b8;
            margin-left: 10px;
        }
        .sync-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: #94a3b8;
        }
        .sync-dot.connected { background: #10b981; }
        .sync-dot.saving { background: #f59e0b; animation: pulse 1s infinite; }
        .sync-dot.error { background: #dc2626; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        
        @media (max-width: 768px) {
            .charts-row { grid-template-columns: 1fr; }
            .paper-meta { grid-template-columns: 1fr; }
            .paper-top { flex-direction: column; }
            .stats { grid-template-columns: repeat(2, 1fr); }
            .form-row { grid-template-columns: 1fr; }
        }
        
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #f8fafc; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
    </style>
</head>
<body>
    <!-- Token 登录弹窗 -->
    <div class="modal-overlay" id="tokenModal">
        <div class="modal">
            <h2>🔐 连接 GitHub 同步</h2>
            <p>输入你的 GitHub Personal Access Token 来同步阅读数据。<br>
            数据存储在 GitHub 仓库中，换设备也能看到。<br>
            <a href="https://github.com/settings/tokens/new?scopes=repo&description=paper-website" target="_blank" style="color:#3b82f6">点此生成 token</a>（勾选 repo 权限即可）</p>
            <input type="password" id="tokenInput" placeholder="粘贴 GitHub Token (ghp_xxx 或 github_pat_xxx)">
            <div id="tokenStatus"></div>
            <div class="modal-btns">
                <button class="btn-secondary" onclick="skipToken()">跳过（仅本地）</button>
                <button class="btn-primary" onclick="saveToken()">连接</button>
            </div>
        </div>
    </div>

    <!-- 删除确认弹窗 -->
    <div class="modal-overlay confirm-modal" id="deleteConfirmModal">
        <div class="modal">
            <h2>🗑️ 确认删除</h2>
            <p>确定要删除这篇论文吗？此操作不可撤销。</p>
            <div class="paper-name" id="deletePaperName"></div>
            <div class="modal-btns">
                <button class="btn-secondary" onclick="closeDeleteConfirm()">取消</button>
                <button class="btn-danger" onclick="confirmDeletePaper()">确认删除</button>
            </div>
        </div>
    </div>

    <!-- 添加论文弹窗 -->
    <div class="modal-overlay add-paper-modal" id="addPaperModal">
        <div class="modal">
            <h2>📄 添加新论文</h2>
            <div class="form-group">
                <label>论文标题 *</label>
                <input type="text" id="newTitle" placeholder="自定义显示名称">
            </div>
            <div class="form-group">
                <label>链接</label>
                <input type="text" id="newLink" placeholder="arXiv 或其他链接">
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>分类 *</label>
                    <select id="newCategory">
                        <option value="综述">综述</option>
                        <option value="数学原理">数学原理</option>
                        <option value="数据集">数据集</option>
                        <option value="抓取生成">抓取生成</option>
                        <option value="抓取执行">抓取执行</option>
                        <option value="基础模型">基础模型</option>
                        <option value="VLA">VLA</option>
                        <option value="World Action Model">World Action Model</option>
                        <option value="灵巧操作">灵巧操作</option>
                        <option value="__custom__">自定义分类...</option>
                    </select>
                    <input type="text" id="newCategoryCustom" placeholder="输入自定义分类名" style="display:none; margin-top:6px">
                </div>
                <div class="form-group">
                    <label>优先级 *</label>
                    <select id="newPriority">
                        <option value="1">P1 必读</option>
                        <option value="2">P2 重要</option>
                        <option value="3">P3 选读</option>
                    </select>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>阅读方式 *</label>
                    <select id="newMethod">
                        <option value="精读">精读</option>
                        <option value="泛读">泛读</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>预计时长(小时) *</label>
                    <input type="number" id="newHours" value="2" min="0.5" step="0.5">
                </div>
            </div>
            <div class="form-group">
                <label>本篇目标</label>
                <textarea id="newGoal" placeholder="读这篇论文要达成什么目标"></textarea>
            </div>
            <div class="form-group">
                <label>阅读产出</label>
                <textarea id="newOutput" placeholder="读完后应该产出什么"></textarea>
            </div>
            <div id="addPaperStatus"></div>
            <div class="modal-btns">
                <button class="btn-secondary" onclick="closeAddPaper()">取消</button>
                <button class="btn-primary" onclick="submitNewPaper()">添加</button>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="header">
            <h1>Kyle Zhu的论文阅读</h1>
            <p class="subtitle">具身智能，灵巧手</p>
            <p class="update-time" id="updateTime"></p>
            <div class="sync-indicator" id="syncIndicator" style="display:none">
                <div class="sync-dot" id="syncDot"></div>
                <span id="syncText"></span>
            </div>
        </div>
        
        <div class="stats">
            <div class="stat-card"><div class="number" id="totalPapers">-</div><div class="label">论文总数</div></div>
            <div class="stat-card"><div class="number" id="readCount">0</div><div class="label">已读</div></div>
            <div class="stat-card"><div class="number" id="unreadCount">-</div><div class="label">待读</div></div>
            <div class="stat-card"><div class="number" id="totalHours">-</div><div class="label">预计总时长</div></div>
            <div class="stat-card"><div class="number" id="readHours">0h</div><div class="label">已读时长</div></div>
        </div>
        
        <div class="progress-section">
            <div class="progress-header">
                <span>阅读进度</span>
                <span class="pct" id="progressText">0%</span>
            </div>

    <script>
    // ============ 配置 ============
    const GITHUB_OWNER = 'Cu2ta1n';
    const GITHUB_REPO = 'Cu2ta1n.github.io';
    const GITHUB_BRANCH = 'main';
    const USER_DATA_PATH = 'user-data.json';
    const API_BASE = 'https://api.github.com/repos/' + GITHUB_OWNER + '/' + GITHUB_REPO;

    // ============ 全局状态 ============
    let papersData = [];
    let customPapers = [];
    let categoriesData = {};
    let readStatus = {};
    let customLinks = {};
    let paperNotes = {};
    let readingLog = {};
    let favorites = {};
    let deletedPaperIds = {}; // 记录被删除的 data.json 论文 ID
    let startDate = new Date().toISOString().split('T')[0];
    let totalOnlineSeconds = 0;
    let lastTickTime = Date.now();
    let currentFilters = { status: 'all', category: 'all', priority: 'all', favorite: 'all' };
    let categoryChart = null;
    let weeklyChart = null;
    let githubToken = localStorage.getItem('githubToken') || '';
    let userDataSha = ''; // 用于更新文件
    let isSyncing = false;
    let saveTimer = null;
    let lastSyncTime = localStorage.getItem('lastSyncTime') || ''; // 最后同步时间

    // ============ GitHub API ============
    function getHeaders() {
        return {
            'Authorization': 'token ' + githubToken,
            'Accept': 'application/vnd.github.v3+json',
            'Content-Type': 'application/json'
        };
    }

    async function loadFromGitHub() {
        if (!githubToken) return null;
        try {
            const resp = await fetch(API_BASE + '/contents/' + USER_DATA_PATH + '?ref=' + GITHUB_BRANCH, {
                headers: getHeaders()
            });
            if (resp.status === 404) return null;
            if (!resp.ok) throw new Error('HTTP ' + resp.status);
            const data = await resp.json();
            userDataSha = data.sha;
            const binaryStr = atob(data.content.replace(/\n/g, ''));
            const bytes = new Uint8Array(binaryStr.length);
            for (let i = 0; i < binaryStr.length; i++) {
                bytes[i] = binaryStr.charCodeAt(i);
            }
            const content = new TextDecoder('utf-8').decode(bytes);
            return JSON.parse(content);
        } catch (e) {
            console.error('Load from GitHub failed:', e);
            return null;
        }
    }

    async function saveToGitHub(force = false) {
        if (!githubToken) return;
        if (isSyncing && !force) return;
        
        // 如果是强制保存但正在同步中，等待当前同步完成
        if (isSyncing && force) {
            let waitCount = 0;
            while (isSyncing && waitCount < 20) {
                await new Promise(resolve => setTimeout(resolve, 500));
                waitCount++;
            }
        }
        
        isSyncing = true;
        updateSyncIndicator('saving');
        
        const data = {
            customPapers: customPapers,
            readStatus: readStatus,
            customLinks: customLinks,
            paperNotes: paperNotes,
            readingLog: readingLog,
            favorites: favorites,
            deletedPaperIds: deletedPaperIds,
            startDate: startDate,
            totalOnlineSeconds: totalOnlineSeconds
        };
        
        const jsonStr = JSON.stringify(data, null, 2);
        const bytes = new TextEncoder().encode(jsonStr);
        let binary = '';
        for (let i = 0; i < bytes.length; i++) {
            binary += String.fromCharCode(bytes[i]);
        }
        const content = btoa(binary);
        const body = {
            message: 'Sync user data - ' + new Date().toISOString(),
            content: content,
            branch: GITHUB_BRANCH
        };
        if (userDataSha) body.sha = userDataSha;
        
        try {
            const resp = await fetch(API_BASE + '/contents/' + USER_DATA_PATH, {
                method: 'PUT',
                headers: getHeaders(),
                body: JSON.stringify(body)
            });
            if (!resp.ok) {
                const errData = await resp.json();
                throw new Error(errData.message || 'HTTP ' + resp.status);
            }
            const result = await resp.json();
            userDataSha = result.content.sha;
            // 记录同步时间
            lastSyncTime = new Date().toLocaleString('zh-CN', { hour12: false });
            localStorage.setItem('lastSyncTime', lastSyncTime);
            document.getElementById('updateTime').textContent = '最后更新: ' + lastSyncTime;
            updateSyncIndicator('connected');
        } catch (e) {
            console.error('Save to GitHub failed:', e);
            updateSyncIndicator('error');
            // 如果 sha 冲突，重新获取 sha 再试一次
            if (e.message.includes('sha')) {
                userDataSha = '';
                const freshData = await loadFromGitHub();
                if (freshData) {
                    // 合并远程数据
                    mergeUserData(freshData);
                    // 重试保存
                    setTimeout(() => { isSyncing = false; saveToGitHub(); }, 1000);
                    return;
                }
            }
        }
        isSyncing = false;
    }

    function debouncedSave() {
        if (saveTimer) clearTimeout(saveTimer);
        saveTimer = setTimeout(saveToGitHub, 3000);
    }

    function updateSyncIndicator(status) {
        const indicator = document.getElementById('syncIndicator');
        const dot = document.getElementById('syncDot');
        const text = document.getElementById('syncText');
        indicator.style.display = 'inline-flex';
        dot.className = 'sync-dot ' + (status === 'connected' ? 'connected' : status === 'saving' ? 'saving' : status === 'error' ? 'error' : '');
        text.textContent = status === 'connected' ? '已同步' : status === 'saving' ? '保存中...' : status === 'error' ? '同步失败' : '未连接';
    }

    // ============ Token 管理 ============
    function showTokenModal() {
        document.getElementById('tokenModal').classList.add('show');
        document.getElementById('tokenInput').value = githubToken;
        document.getElementById('tokenStatus').innerHTML = githubToken ? '<div class="sync-status success">当前已连接</div>' : '';
    }

    async function saveToken() {
        const token = document.getElementById('tokenInput').value.trim();
        if (!token) {
            document.getElementById('tokenStatus').innerHTML = '<div class="sync-status error">请输入 token</div>';
            return;
        }
        // 验证 token
        document.getElementById('tokenStatus').innerHTML = '<div class="sync-status info">验证中...</div>';
        try {
            const resp = await fetch('https://api.github.com/user', {
                headers: { 'Authorization': 'token ' + token }
            });
            if (!resp.ok) throw new Error('Invalid token');
            const user = await resp.json();
            
            githubToken = token;
            localStorage.setItem('githubToken', token);
            document.getElementById('tokenStatus').innerHTML = '<div class="sync-status success">✓ 已连接为 ' + user.login + '，正在同步数据...</div>';
            
            // 加载远程数据
            const remoteData = await loadFromGitHub();
            if (remoteData) {
                mergeUserData(remoteData);
            }
            
            setTimeout(() => {
                document.getElementById('tokenModal').classList.remove('show');
                updateSyncIndicator('connected');
                refreshAll();
            }, 1000);
        } catch (e) {
            document.getElementById('tokenStatus').innerHTML = '<div class="sync-status error">Token 无效或无权限，请检查</div>';
        }
    }

    function skipToken() {
        document.getElementById('tokenModal').classList.remove('show');
        // 从 localStorage 恢复
        loadFromLocalStorage();
        refreshAll();
        startOnlineTracking();
    }

    function mergeUserData(remote) {
        if (remote.customPapers) {
            // 确保远程数据正确解码
            customPapers = remote.customPapers.map(p => ({
                ...p,
                category: p.category || '',
                readMethod: p.readMethod || ''
            }));
        }
        if (remote.readStatus) readStatus = Object.assign(readStatus, remote.readStatus);
        if (remote.customLinks) customLinks = Object.assign(customLinks, remote.customLinks);
        if (remote.paperNotes) {
            for (const id in remote.paperNotes) {
                if (!paperNotes[id]) paperNotes[id] = {};
                Object.assign(paperNotes[id], remote.paperNotes[id]);
            }
        }
        if (remote.readingLog) {
            for (const date in remote.readingLog) {
                if (!readingLog[date]) readingLog[date] = { papers: 0, hours: 0 };
                readingLog[date].papers = Math.max(readingLog[date].papers, remote.readingLog[date].papers || 0);
                readingLog[date].hours = Math.max(readingLog[date].hours, remote.readingLog[date].hours || 0);
            }
        }
        if (remote.favorites) favorites = Object.assign(favorites, remote.favorites);
        if (remote.deletedPaperIds) deletedPaperIds = Object.assign(deletedPaperIds, remote.deletedPaperIds);
        if (remote.startDate) startDate = remote.startDate;
        if (remote.totalOnlineSeconds) totalOnlineSeconds = Math.max(totalOnlineSeconds, remote.totalOnlineSeconds);
        
        // 同步到 localStorage
        saveToLocalStorage();
    }

    function saveToLocalStorage() {
        localStorage.setItem('paperReadStatus', JSON.stringify(readStatus));
        localStorage.setItem('customArxivLinks', JSON.stringify(customLinks));
        localStorage.setItem('paperNotes', JSON.stringify(paperNotes));
        localStorage.setItem('readingLog', JSON.stringify(readingLog));
        localStorage.setItem('paperFavorites', JSON.stringify(favorites));
        localStorage.setItem('deletedPaperIds', JSON.stringify(deletedPaperIds));
        localStorage.setItem('readingStartDate', startDate);
        localStorage.setItem('totalOnlineSeconds', totalOnlineSeconds.toString());
        localStorage.setItem('customPapers', JSON.stringify(customPapers));
    }

    function loadFromLocalStorage() {
        readStatus = JSON.parse(localStorage.getItem('paperReadStatus') || '{}');
        customLinks = JSON.parse(localStorage.getItem('customArxivLinks') || '{}');
        paperNotes = JSON.parse(localStorage.getItem('paperNotes') || '{}');
        readingLog = JSON.parse(localStorage.getItem('readingLog') || '{}');
        favorites = JSON.parse(localStorage.getItem('paperFavorites') || '{}');
        deletedPaperIds = JSON.parse(localStorage.getItem('deletedPaperIds') || '{}');
        startDate = localStorage.getItem('readingStartDate') || new Date().toISOString().split('T')[0];
        totalOnlineSeconds = parseFloat(localStorage.getItem('totalOnlineSeconds') || '0');
        customPapers = JSON.parse(localStorage.getItem('customPapers') || '[]');
    }

    async function manualSync() {
        if (!githubToken) {
            showTokenModal();
            return;
        }
        updateSyncIndicator('saving');
        await saveToGitHub(true);
    }

    // ============ 在线时间追踪 ============
    function startOnlineTracking() {
        setInterval(function() {
            if (document.visibilityState === 'visible') {
                const now = Date.now();
                const elapsed = (now - lastTickTime) / 1000;
                totalOnlineSeconds += elapsed;
                lastTickTime = now;
                
                const today = new Date().toISOString().split('T')[0];
                if (!readingLog[today]) readingLog[today] = { papers: 0, hours: 0 };
                readingLog[today].hours += elapsed / 3600;
                
                // 每30秒保存一次到 localStorage
                localStorage.setItem('totalOnlineSeconds', totalOnlineSeconds.toString());
                localStorage.setItem('readingLog', JSON.stringify(readingLog));
                
                // 每2分钟同步到 GitHub
                if (githubToken && Math.floor(totalOnlineSeconds) % 120 < 5) {
                    debouncedSave();
                }
                
                const hours = totalOnlineSeconds / 3600;
                document.getElementById('readHours').textContent = hours < 1 
                    ? Math.round(totalOnlineSeconds / 60) + 'min' 
                    : hours.toFixed(1) + 'h';
            } else {
                lastTickTime = Date.now();
            }
        }, 5000);
    }

    function formatOnlineTime() {
        const hours = totalOnlineSeconds / 3600;
        return hours < 1 
            ? Math.round(totalOnlineSeconds / 60) + 'min' 
            : hours.toFixed(1) + 'h';
    }

    // ============ 数据加载 ============
    async function loadData() {
        const resp = await fetch('data.json?t=' + Date.now());
        const data = await resp.json();
        papersData = data.papers;
        categoriesData = data.categories;
        
        // 显示最后同步时间（如果有）
        if (lastSyncTime) {
            document.getElementById('updateTime').textContent = '最后更新: ' + lastSyncTime;
        } else {
            document.getElementById('updateTime').textContent = '最后更新: 尚未同步';
        }
        
        // 如果有 token，从 GitHub 加载用户数据
        if (githubToken) {
            updateSyncIndicator('saving');
            const remoteData = await loadFromGitHub();
            if (remoteData) {
                mergeUserData(remoteData);
                updateSyncIndicator('connected');
            } else {
                // 远程没有数据，从 localStorage 恢复并上传
                loadFromLocalStorage();
                if (Object.keys(readStatus).length > 0 || customPapers.length > 0) {
                    await saveToGitHub(true);
                }
                updateSyncIndicator('connected');
            }
        } else {
            loadFromLocalStorage();
            // 显示 token 弹窗
            document.getElementById('tokenModal').classList.add('show');
        }
        
        buildCategoryFilter();
        refreshAll();
        startOnlineTracking();
    }

    function buildCategoryFilter() {
        const catFilter = document.getElementById('categoryFilter');
        // 清除旧的动态分类按钮（保留"全部"）
        while (catFilter.children.length > 1) catFilter.removeChild(catFilter.lastChild);
        
        // 合并 data.json 的分类和自定义论文的分类
        const allCats = new Set(Object.keys(categoriesData));
        customPapers.forEach(p => allCats.add(p.category));
        
        allCats.forEach(cat => {
            const btn = document.createElement('button');
            btn.className = 'filter-btn';
            btn.dataset.category = cat;
            btn.textContent = cat;
            catFilter.appendChild(btn);
        });
        
        // 重新绑定事件
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.removeEventListener('click', filterClickHandler);
            btn.addEventListener('click', filterClickHandler);
        });
    }

    function filterClickHandler() {
        const group = this.parentElement;
        group.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        if (this.dataset.status !== undefined) currentFilters.status = this.dataset.status;
        if (this.dataset.category !== undefined) currentFilters.category = this.dataset.category;
        if (this.dataset.priority !== undefined) currentFilters.priority = this.dataset.priority;
        if (this.dataset.favorite !== undefined) currentFilters.favorite = this.dataset.favorite;
        renderPapers();
    }

    // 搜索功能
    document.getElementById('searchBox').addEventListener('input', function() {
        renderPapers();
    });

    // 安全地生成 onclick 中的 ID 字符串
    function safeId(id) {
        return typeof id === 'string' ? "'" + id.replace(/'/g, "\\'") + "'" : id;
    }

    function refreshAll() {
        updateStats();
        renderCharts();
        renderContribution();
        renderPapers();
    }

    // ============ 添加论文 ============
    function openAddPaper() {
        if (!githubToken) {
            alert('请先连接 GitHub 同步后再添加论文');
            showTokenModal();
            return;
        }
        document.getElementById('addPaperModal').classList.add('show');
        document.getElementById('addPaperStatus').innerHTML = '';
        // 重置表单
        document.getElementById('newTitle').value = '';
        document.getElementById('newLink').value = '';
        document.getElementById('newCategory').value = '综述';
        document.getElementById('newCategoryCustom').style.display = 'none';
        document.getElementById('newCategoryCustom').value = '';
        document.getElementById('newPriority').value = '1';
        document.getElementById('newMethod').value = '精读';
        document.getElementById('newHours').value = '2';
        document.getElementById('newGoal').value = '';
        document.getElementById('newOutput').value = '';
    }

    function closeAddPaper() {
        document.getElementById('addPaperModal').classList.remove('show');
    }

    // 自定义分类下拉
    document.getElementById('newCategory').addEventListener('change', function() {
        const customInput = document.getElementById('newCategoryCustom');
        customInput.style.display = this.value === '__custom__' ? 'block' : 'none';
    });

    async function submitNewPaper() {
        const title = document.getElementById('newTitle').value.trim();
        if (!title) {
            document.getElementById('addPaperStatus').innerHTML = '<div class="sync-status error">请输入论文标题</div>';
            return;
        }
        
        let category = document.getElementById('newCategory').value;
        if (category === '__custom__') {
            category = document.getElementById('newCategoryCustom').value.trim();
            if (!category) {
                document.getElementById('addPaperStatus').innerHTML = '<div class="sync-status error">请输入自定义分类名</div>';
                return;
            }
        }
        
        const link = document.getElementById('newLink').value.trim();
        const priority = parseInt(document.getElementById('newPriority').value);
        const method = document.getElementById('newMethod').value;
        const hours = parseFloat(document.getElementById('newHours').value) || 2;
        const goal = document.getElementById('newGoal').value.trim() || '待补充';
        const output = document.getElementById('newOutput').value.trim() || '待补充';
        
        // 生成 ID
        const newId = 'custom_' + Date.now();
        const newPaper = {
            id: newId,
            title: title,
            category: category,
            priority: priority,
            readMethod: method,
            hours: hours,
            goal: goal,
            output: output,
            arxivLink: link,
            isCustom: true,
            addedAt: new Date().toISOString()
        };
        
        customPapers.push(newPaper);
        saveToLocalStorage();
        
        document.getElementById('addPaperStatus').innerHTML = '<div class="sync-status info">正在同步到 GitHub...</div>';
        await saveToGitHub(true);  // 强制保存，确保数据立即同步
        document.getElementById('addPaperStatus').innerHTML = '<div class="sync-status success">✓ 添加成功！</div>';
        
        setTimeout(() => {
            closeAddPaper();
            buildCategoryFilter();
            refreshAll();
        }, 800);
    }



    // ============ 图表 ============
    function renderCharts() {
        // 合并分类数据
        const mergedCats = Object.assign({}, categoriesData);
        customPapers.forEach(p => {
            if (!mergedCats[p.category]) mergedCats[p.category] = { count: 0, hours: 0 };
            mergedCats[p.category].count++;
            mergedCats[p.category].hours += p.hours;
        });
        
        const catLabels = Object.keys(mergedCats);
        const catCounts = catLabels.map(c => mergedCats[c].count);
        const catColors = ['#3b82f6','#f59e0b','#10b981','#ec4899','#8b5cf6','#06b6d4','#f97316','#84cc16','#e11d48','#64748b','#a855f7','#14b8a6'];
        
        if (categoryChart) categoryChart.destroy();
        categoryChart = new Chart(document.getElementById('categoryPie'), {
            type: 'doughnut',
            data: {
                labels: catLabels,
                datasets: [{ data: catCounts, backgroundColor: catColors, borderColor: 'white', borderWidth: 2 }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { position: 'right', labels: { color: '#64748b', font: { size: 11 }, padding: 8 } },
                    tooltip: {
                        callbacks: {
                            label: function(ctx) {
                                const total = ctx.dataset.data.reduce((a,b) => a+b, 0);
                                const pct = ((ctx.parsed / total) * 100).toFixed(1);
                                return ctx.label + ': ' + ctx.parsed + ' (' + pct + '%)';
                            }
                        }
                    }
                }
            }
        });
        
        const now = new Date();
        const dayOfWeek = now.getDay();
        const mondayOffset = dayOfWeek === 0 ? -6 : 1 - dayOfWeek;
        const monday = new Date(now);
        monday.setDate(now.getDate() + mondayOffset);
        
        const weekLabels = ['周一','周二','周三','周四','周五','周六','周日'];
        const weekData = weekLabels.map((label, i) => {
            const d = new Date(monday);
            d.setDate(monday.getDate() + i);
            const dateStr = d.toISOString().split('T')[0];
            const log = readingLog[dateStr] || { papers: 0, hours: 0 };
            return log.papers;
        });
        
        if (weeklyChart) weeklyChart.destroy();
        weeklyChart = new Chart(document.getElementById('weeklyBar'), {
            type: 'bar',
            data: {
                labels: weekLabels,
                datasets: [{
                    label: '已读论文数',
                    data: weekData,
                    backgroundColor: '#3b82f688',
                    borderColor: '#3b82f6',
                    borderWidth: 1
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { labels: { color: '#64748b' } } },
                scales: {
                    x: { ticks: { color: '#64748b' }, grid: { color: '#f1f5f9' } },
                    y: { ticks: { color: '#64748b' }, grid: { color: '#f1f5f9' }, beginAtZero: true }
                }
            }
        });
    }

    function renderContribution() {
        const grid = document.getElementById('contributionGrid');
        grid.innerHTML = '';
        const today = new Date();
        const start = new Date(startDate);
        
        const diffTime = today - start;
        const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
        
        for (let i = 0; i <= diffDays; i++) {
            const date = new Date(start);
            date.setDate(date.getDate() + i);
            const dateStr = date.toISOString().split('T')[0];
            const log = readingLog[dateStr] || { papers: 0, hours: 0 };
            
            const day = document.createElement('div');
            day.className = 'contribution-day';
            if (log.hours > 0) {
                if (log.hours < 1) day.classList.add('level-1');
                else if (log.hours < 2) day.classList.add('level-2');
                else if (log.hours < 4) day.classList.add('level-3');
                else if (log.hours >= 6) day.classList.add('level-4');
                else day.classList.add('level-3');
            }
            day.title = dateStr + ': ' + log.papers + '篇, ' + (log.hours < 1 ? Math.round(log.hours * 60) + 'min' : log.hours.toFixed(1) + 'h');
            grid.appendChild(day);
        }
    }

    function logReading(paperId, hours) {
        const today = new Date().toISOString().split('T')[0];
        if (!readingLog[today]) readingLog[today] = { papers: 0, hours: 0 };
        readingLog[today].papers += 1;
        saveToLocalStorage();
        if (githubToken) debouncedSave();
        renderContribution();
    }

    function unlogReading(paperId, hours) {
        const today = new Date().toISOString().split('T')[0];
        if (readingLog[today] && readingLog[today].papers > 0) {
            readingLog[today].papers -= 1;
            saveToLocalStorage();
            if (githubToken) debouncedSave();
            renderContribution();
        }
    }

    // ============ 统计 ============
    function getAllPapers() {
        return papersData.concat(customPapers).filter(p => !deletedPaperIds[String(p.id)]);
    }

    function updateStats() {
        const allPapers = getAllPapers();
        const readCount = allPapers.filter(p => readStatus[String(p.id)]).length;
        const unreadCount = allPapers.length - readCount;
        const progress = allPapers.length ? Math.round((readCount / allPapers.length) * 100) : 0;
        const totalHours = allPapers.filter(p => !readStatus[String(p.id)]).reduce((s, p) => s + p.hours, 0);
        const onlineTimeText = formatOnlineTime();
        
        document.getElementById('totalPapers').textContent = allPapers.length;
        document.getElementById('readCount').textContent = readCount;
        document.getElementById('unreadCount').textContent = unreadCount;
        document.getElementById('totalHours').textContent = totalHours + 'h';
        document.getElementById('readHours').textContent = onlineTimeText;
        document.getElementById('progressText').textContent = progress + '%';
        document.getElementById('progressFill').style.width = progress + '%';
    }

    // ============ 论文操作 ============
    function toggleRead(id) {
        const idStr = String(id);
        const wasRead = readStatus[idStr];
        readStatus[idStr] = !readStatus[idStr];
        saveToLocalStorage();
        if (githubToken) debouncedSave();
        
        const allPapers = getAllPapers();
        const paper = allPapers.find(p => String(p.id) === idStr);
        
        if (!wasRead) {
            // 标记为已读
            if (paper) logReading(idStr, paper.hours);
        } else {
            // 取消已读
            if (paper) unlogReading(idStr, paper.hours);
        }
        
        updateStats();
        renderPapers();
        renderCharts();
    }

    function toggleFavorite(id) {
        const idStr = String(id);
        favorites[idStr] = !favorites[idStr];
        saveToLocalStorage();
        if (githubToken) {
            // 立即保存，不用 debounce，避免刷新前丢失
            saveToGitHub(true);
        }
        renderPapers();
    }

    function addArxivLink(id) {
        const idStr = String(id);
        const input = document.getElementById('link-input-' + id);
        let url = input.value.trim();
        if (!url) { alert('请输入链接'); return; }
        if (!url.startsWith('http://') && !url.startsWith('https://') && !url.startsWith('file://')) {
            url = 'https://' + url;
        }
        customLinks[idStr] = url;
        saveToLocalStorage();
        if (githubToken) debouncedSave();
        renderPapers();
    }

    function toggleAddLink(id) {
        document.getElementById('add-link-form-' + id).classList.toggle('show');
    }

    function toggleEditLink(id) {
        document.getElementById('edit-link-form-' + id).classList.toggle('show');
    }

    function updateArxivLink(id) {
        const idStr = String(id);
        const input = document.getElementById('edit-input-' + id);
        let url = input.value.trim();
        if (!url) {
            if (confirm('确定要删除这个链接吗？')) {
                delete customLinks[idStr];
                saveToLocalStorage();
                if (githubToken) debouncedSave();
                renderPapers();
            }
            return;
        }
        if (!url.startsWith('http://') && !url.startsWith('https://') && !url.startsWith('file://')) {
            url = 'https://' + url;
        }
        customLinks[idStr] = url;
        saveToLocalStorage();
        if (githubToken) debouncedSave();
        renderPapers();
    }

    function toggleNote(id) {
        document.getElementById('notes-' + id).classList.toggle('show');
    }

    function saveNote(id, field) {
        const idStr = String(id);
        const textarea = document.getElementById('note-' + id + '-' + field);
        if (!paperNotes[idStr]) paperNotes[idStr] = {};
        paperNotes[idStr][field] = textarea.value;
        saveToLocalStorage();
        if (githubToken) debouncedSave();
    }

    // ============ 渲染论文列表 ============
    function renderPapers() {
        const allPapers = getAllPapers();
        const grid = document.getElementById('papersGrid');
        const searchTerm = document.getElementById('searchBox').value.trim().toLowerCase();
        
        let filtered = allPapers.filter(p => {
            const idStr = String(p.id);
            if (currentFilters.status === 'read' && !readStatus[idStr]) return false;
            if (currentFilters.status === 'unread' && readStatus[idStr]) return false;
            if (currentFilters.favorite === 'yes' && !favorites[idStr]) return false;
            if (currentFilters.category !== 'all' && p.category !== currentFilters.category) return false;
            if (currentFilters.priority !== 'all' && p.priority !== parseInt(currentFilters.priority)) return false;
            if (searchTerm && !p.title.toLowerCase().includes(searchTerm)) return false;
            return true;
        });
        
        filtered.sort((a, b) => {
            // 自定义论文排最前
            if (a.isCustom && !b.isCustom) return -1;
            if (!a.isCustom && b.isCustom) return 1;
            // 自定义论文之间：按添加时间倒序（最新的在最上面）
            if (a.isCustom && b.isCustom) {
                return (b.addedAt || '').localeCompare(a.addedAt || '');
            }
            // 非自定义论文：未读排前面
            const aRead = readStatus[String(a.id)] ? 1 : 0;
            const bRead = readStatus[String(b.id)] ? 1 : 0;
            return aRead - bRead;
        });
        
        if (!filtered.length) {
            grid.innerHTML = '<div class="empty-state">没有匹配的论文</div>';
            return;
        }
        
        grid.innerHTML = filtered.map(p => {
            const idStr = String(p.id);
            const isRead = readStatus[idStr];
            const pClass = p.priority === 1 ? 'badge-p1' : p.priority === 2 ? 'badge-p2' : 'badge-p3';
            const pText = p.priority === 1 ? 'P1 必读' : p.priority === 2 ? 'P2 重要' : 'P3 选读';
            const arxivLink = customLinks[idStr] || p.arxivLink;
            const sid = safeId(p.id);
            const arxivBtn = arxivLink ? '<a href="' + arxivLink + '" target="_blank" class="btn btn-arxiv">arXiv</a>' : '';
            const addLinkForm = !p.arxivLink && !customLinks[idStr] ? 
                '<button class="btn btn-add-link" onclick="toggleAddLink(' + sid + ')">+ 添加链接</button>' +
                '<div class="add-link-form" id="add-link-form-' + p.id + '">' +
                    '<input type="text" id="link-input-' + p.id + '" placeholder="输入链接">' +
                    '<button onclick="addArxivLink(' + sid + ')">保存</button>' +
                '</div>' : '';
            const editLinkForm = arxivLink ? 
                '<button class="btn btn-add-link" onclick="toggleEditLink(' + sid + ')">修改链接</button>' +
                '<div class="add-link-form" id="edit-link-form-' + p.id + '">' +
                    '<input type="text" id="edit-input-' + p.id + '" value="' + (arxivLink || '') + '" placeholder="输入新链接">' +
                    '<button onclick="updateArxivLink(' + sid + ')">更新</button>' +
                '</div>' : '';
            const deleteBtn = '<button class="btn btn-delete" onclick="showDeleteConfirm(' + sid + ')">删除</button>';
            
            const notes = paperNotes[p.id] || {};
            const noteFields = [
                {key: 'question', label: '一句话问题'},
                {key: 'io', label: '核心输入/输出'},
                {key: 'pipeline', label: '方法pipeline'},
                {key: 'action', label: '动作空间'},
                {key: 'obs', label: '观测空间'},
                {key: 'training', label: '训练方式'},
                {key: 'data', label: '数据/物体/手型'},
                {key: 'metrics', label: '成功判据与指标'},
                {key: 'innovation', label: '最关键创新'},
                {key: 'limitation', label: '最大局限'},
                {key: 'relation', label: '与我的课题关系'},
                {key: 'code', label: '可复现代码位置'},
                {key: 'summary', label: '五句话总结'}
            ];
            
            const notesHtml = noteFields.map(f => 
                '<div class="note-field">' +
                    '<label>' + f.label + '</label>' +
                    '<textarea id="note-' + p.id + '-' + f.key + '" data-paper-id="' + p.id + '" data-field="' + f.key + '" onblur="saveNote(this.dataset.paperId, this.dataset.field)">' + (notes[f.key] || '') + '</textarea>' +
                '</div>'
            ).join('');
            
            return '<div class="paper-card ' + (isRead ? 'read' : '') + '">' +
                '<span class="read-badge">已读</span>' +
                '<div class="paper-top">' +
                    '<div class="paper-title">' + p.title + '</div>' +
                    '<div class="paper-badges">' +
                        '<span class="badge ' + pClass + '">' + pText + '</span>' +
                        '<span class="badge badge-method">' + p.readMethod + '</span>' +
                        '<span class="badge badge-cat">' + p.category + '</span>' +
                        '<span class="badge badge-hours">' + p.hours + 'h</span>' +
                    '</div>' +
                '</div>' +
                '<div class="paper-meta">' +
                    '<div class="meta-item"><div class="meta-label">本篇目标</div><div class="meta-value">' + p.goal + '</div></div>' +
                    '<div class="meta-item"><div class="meta-label">阅读产出</div><div class="meta-value">' + p.output + '</div></div>' +
                '</div>' +
                '<div class="paper-actions">' +
                    arxivBtn +
                    '<button class="btn btn-read ' + (isRead ? 'is-read' : '') + '" onclick="toggleRead(' + sid + ')">' +
                        (isRead ? '✓ 已读' : '标记已读') +
                    '</button>' +
                    '<button class="btn btn-note" onclick="toggleNote(' + sid + ')">📝 笔记</button>' +
                    '<button class="btn btn-favorite ' + (favorites[p.id] ? 'is-favorite' : '') + '" onclick="toggleFavorite(' + sid + ')">' +
                        (favorites[p.id] ? '★ 已收藏' : '☆ 收藏') +
                    '</button>' +
                    addLinkForm +
                    editLinkForm +
                    deleteBtn +
                '</div>' +
                '<div class="notes-section" id="notes-' + p.id + '">' +
                    '<h4>阅读笔记</h4>' +
                    notesHtml +
                '</div>' +
            '</div>';
        }).join('');
    }

    // ============ 其他功能 ============
    function resetTodayReadingTime() {
        const today = new Date().toISOString().split('T')[0];
        if (readingLog[today]) {
            readingLog[today].hours = 0;
            totalOnlineSeconds = 0;
            saveToLocalStorage();
            if (githubToken) debouncedSave();
            lastTickTime = Date.now();
            updateStats();
            renderContribution();
            alert('今日阅读时间已清零');
        } else {
            alert('今天还没有阅读记录');
        }
    }

    function exportStatus() {
        const data = {
            readStatus: readStatus,
            customLinks: customLinks,
            paperNotes: paperNotes,
            readingLog: readingLog,
            favorites: favorites,
            startDate: startDate,
            customPapers: customPapers,
            totalOnlineSeconds: totalOnlineSeconds
        };
        const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'paper-reading-data.json';
        a.click();
    }

    function importStatus(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const data = JSON.parse(e.target.result);
                if (data.readStatus) readStatus = Object.assign(readStatus, data.readStatus);
                if (data.customLinks) customLinks = Object.assign(customLinks, data.customLinks);
                if (data.paperNotes) {
                    for (const id in data.paperNotes) {
                        if (!paperNotes[id]) paperNotes[id] = {};
                        Object.assign(paperNotes[id], data.paperNotes[id]);
                    }
                }
                if (data.readingLog) {
                    for (const date in data.readingLog) {
                        if (!readingLog[date]) readingLog[date] = { papers: 0, hours: 0 };
                        readingLog[date].papers = Math.max(readingLog[date].papers, data.readingLog[date].papers || 0);
                        readingLog[date].hours = Math.max(readingLog[date].hours, data.readingLog[date].hours || 0);
                    }
                }
                if (data.favorites) favorites = Object.assign(favorites, data.favorites);
                if (data.startDate) startDate = data.startDate;
                if (data.customPapers) customPapers = data.customPapers;
                if (data.totalOnlineSeconds) totalOnlineSeconds = Math.max(totalOnlineSeconds, data.totalOnlineSeconds);
                
                saveToLocalStorage();
                if (githubToken) saveToGitHub(true);
                
                buildCategoryFilter();
                updateStats();
                renderPapers();
                renderCharts();
                renderContribution();
                alert('导入成功！');
            } catch(err) {
                alert('导入失败：文件格式错误');
            }
        };
        reader.readAsText(file);
    }

    // ============ 删除论文 ============

    function showDeleteConfirm(paperId) {
        const idStr = String(paperId);
        const allPapers = getAllPapers();
        const paper = allPapers.find(p => String(p.id) === idStr);
        if (!paper) return;
        contextMenuPaperId = idStr;
        document.getElementById('deletePaperName').textContent = paper.title;
        document.getElementById('deleteConfirmModal').classList.add('show');
    }

    function closeDeleteConfirm() {
        document.getElementById('deleteConfirmModal').classList.remove('show');
        contextMenuPaperId = null;
    }

    async function confirmDeletePaper() {
        if (contextMenuPaperId === null || contextMenuPaperId === undefined) return;
        await deletePaper(contextMenuPaperId);
        closeDeleteConfirm();
    }

    async function deletePaper(paperId) {
        const idStr = String(paperId);
        const isCustom = customPapers.some(p => String(p.id) === idStr);
        
        if (isCustom) {
            // 自定义论文：直接从数组移除
            customPapers = customPapers.filter(p => String(p.id) !== idStr);
        } else {
            // data.json 论文：加入隐藏列表（统一用字符串键）
            deletedPaperIds[idStr] = true;
        }
        
        // 清理相关数据（统一用字符串键）
        delete readStatus[idStr];
        delete customLinks[idStr];
        delete paperNotes[idStr];
        delete favorites[idStr];
        
        saveToLocalStorage();
        await saveToGitHub(true);  // 强制保存，确保数据立即同步
        buildCategoryFilter();
        refreshAll();
    }

    // ============ 启动 ============
    loadData();
    </script>
